<!DOCTYPE html>
<html lang="ru" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Вход — Монитор SmartComm</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/components.css">
<style>
  /* Дизайн-токены (CSS-переменные) вынесены в /tokens.css (публичный роут —
     login отдаётся неаутентифицированным). */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               -webkit-text-size-adjust: 100%; }
  body { display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
          padding: 28px; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { margin: 0 0 6px; font-size: 20px; font-weight: 500; }
  .sub { margin: 0 0 22px; font-size: 12.5px; color: var(--text-muted); }
  label { display: block; font-size: 11.5px; color: var(--text-muted); margin: 12px 0 4px; }
  input { width: 100%; padding: 10px 12px; font: inherit; font-size: 14px;
          background: var(--bg-inner); color: var(--text); border: 1px solid var(--border);
          border-radius: 8px; -webkit-tap-highlight-color: transparent; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,58,104,0.12); }
  .btn { width: 100%; padding: 11px; font: inherit; font-size: 14px; font-weight: 500;
         color: white; background: var(--accent); border: none; border-radius: 9px;
         cursor: pointer; margin-top: 18px; transition: filter 0.15s; }
  .btn:hover:not(:disabled) { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .err { color: var(--err); font-size: 12.5px; margin-top: 12px; min-height: 18px; }
  .hint { margin-top: 18px; padding: 10px 12px; background: rgba(239,159,39,0.1);
          border-left: 3px solid var(--warn); border-radius: 6px; font-size: 11.5px;
          color: var(--text-muted); display: none; }
  .hint.show { display: block; }
  .footer { margin-top: 22px; text-align: center; font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>
  <form class="card" id="login-form" onsubmit="return doLogin(event)">
    <h1>Монитор SmartComm</h1>
    <p class="sub">Войдите чтобы получить доступ к панели</p>

    <label for="username">Логин</label>
    <input type="text" id="username" name="username" autocomplete="username"
           autocapitalize="none" autocorrect="off" required>

    <label for="password">Пароль</label>
    <input type="password" id="password" name="password"
           autocomplete="current-password" required>

    <div class="err" id="err"></div>

    <button type="submit" class="btn" id="btn-login">Войти</button>

    <div class="hint" id="hint-default">
      <b>Первый вход</b>: используй логин <code>admin</code> / пароль <code>admin</code>.
      После входа сразу сменишь пароль.
    </div>

    <div class="footer">SmartComm Dashboard · LAN-only</div>
  </form>

<script>
(function applyTheme(){
  const t = localStorage.getItem('theme');
  if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
})();

// SECURITY: open-redirect. Пропускаем ТОЛЬКО локальный путь (один ведущий '/',
// не '//host' и не '/\\host'), иначе ?next=//evil.com увёл бы оператора после входа.
function safeNext() {
  const n = new URLSearchParams(location.search).get('next') || '/';
  return (/^\/[^/\\]/.test(n) || n === '/') ? n : '/';
}

// Если уже залогинены — редирект на главную
fetch('/api/auth/me').then(r => r.json()).then(j => {
  if (j.authenticated) {
    const next = safeNext();
    location.href = next;
  } else {
    // Показать подсказку про admin/admin если ещё не входили (нет cookie)
    document.getElementById('hint-default').classList.add('show');
    document.getElementById('username').focus();
  }
}).catch(() => {
  document.getElementById('username').focus();
});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Проверка…';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      })
    });
    const j = await r.json();
    if (j.ok) {
      const next = safeNext();
      if (j.must_change_password) {
        sessionStorage.setItem('sc_force_pw_change', '1');
      }
      location.href = next;
    } else {
      err.textContent = j.error || 'Ошибка входа';
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  } catch (e) {
    err.textContent = 'Сеть недоступна: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
  return false;
}
</script>
</body>
</html>
